name: Send Digest Email
on:
  push:
    paths:
      - 'digest.html'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install AgentMail SDK
        run: pip install agentmail

      - name: Send via AgentMail
        env:
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          from agentmail import AgentMail

          client = AgentMail(api_key=os.environ["AGENTMAIL_API_KEY"])

          with open("digest.html", "r") as f:
              html = f.read()

          result = client.inboxes.messages.send(
              inbox_id="hda@agentmail.to",
              to=["jeroen.colon@hda.fgov.be"],
              subject="EU Funding Digest",
              text="See HTML version",
              html=html
          )
          print("SUCCESS:", result)
          EOF
